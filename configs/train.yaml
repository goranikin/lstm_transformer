defaults:
  - scale: pilot
  - _self_

seed: 1234
device: auto
problem: tsp
encoder: attention
decoder: attention_pointer
mode: supervised

data:
  root: ${oc.env:HOME}/local_db/lstm_transformer
  use_default_paths: true
  train_path: null
  val_path: null
  test_path: null
  target_algorithm: null
  batch_size: ${scale.batch_size}
  eval_batch_size: ${scale.batch_size}
  num_workers: 0
  shuffle: true

paths:
  output_root: outputs/src
  output_dir: null

model:
  d_model: null
  d_ff: null
  num_layers: 3
  num_heads: 8
  dropout: 0.0
  tanh_clip: 10.0

parameter_budget:
  enabled: true
  path: outputs/src/parameter_budget.json
  target_params: null
  strict: false
  search:
    base_d_model: 128
    d_ff: null
    d_ff_multiplier: 4
    min_d_model: 16
    max_d_model: 512
    d_model_step: 8

trainer:
  epochs: ${scale.epochs}
  steps_per_epoch: ${scale.steps_per_epoch}
  learning_rate: 1.0e-4
  max_grad_norm: 1.0
  baseline: rollout
  baseline_alpha: 0.05
  baseline_warmup_epochs: 1
  exp_baseline_beta: 0.8
  log_every: 25
  progress_bar: true
  save_checkpoints: true

wandb:
  enabled: true
  project: lstm_transformer
  entity: goranikin-my-project
  name: null
  group: null
  tags: []
  mode: online
  train_eval_batches: 10

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
